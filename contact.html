<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10">
    <div class="max-w-md mx-auto bg-gray-800 p-8 rounded-xl">
        <h1 class="text-2xl font-bold mb-6">Contact Us</h1>
        <form>
            <input type="text" placeholder="Your Name" class="w-full p-2 mb-4 bg-gray-700 rounded">
            <input type="email" placeholder="Your Email" class="w-full p-2 mb-4 bg-gray-700 rounded">
            <textarea placeholder="Message" class="w-full p-2 mb-4 bg-gray-700 rounded"></textarea>
            <button class="w-full bg-indigo-600 p-2 rounded">Send Message</button>
        </form>
    </div>
</body>
</html>
