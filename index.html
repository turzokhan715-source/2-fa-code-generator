<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #fff; }
        .tool-page { display: none; }
        .active { display: block; }
        .nav-link { cursor: pointer; }
    </style>
</head>
<body class="p-10">

    <!-- Navbar -->
    <nav class="max-w-5xl mx-auto flex justify-between items-center mb-12">
        <h1 class="text-2xl font-black">AI STUDIO</h1>
        <div class="space-x-6 text-sm font-medium text-slate-400">
            <span class="nav-link" onclick="showPage('home')">Home</span>
            <span>About</span>
            <span>Contact</span>
        </div>
    </nav>

    <!-- Home Page: 3 Cards -->
    <div id="home" class="tool-page active max-w-5xl mx-auto">
        <h2 class="text-4xl font-bold mb-10">Choose Your Tool</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-[#111] p-8 rounded-2xl border border-slate-800">
                <i class="fas fa-microphone-slash text-indigo-500 text-3xl mb-4"></i>
                <h3 class="text-lg font-bold mb-2">Noise Reducer</h3>
                <button onclick="showPage('noise-tool')" class="mt-4 bg-white text-black px-4 py-2 rounded-lg text-sm font-bold">Open Tool</button>
            </div>
            <div class="bg-[#111] p-8 rounded-2xl border border-slate-800">
                <i class="fas fa-closed-captioning text-indigo-500 text-3xl mb-4"></i>
                <h3 class="text-lg font-bold mb-2">Subtitle Gen</h3>
                <button onclick="showPage('subtitle-tool')" class="mt-4 bg-white text-black px-4 py-2 rounded-lg text-sm font-bold">Open Tool</button>
            </div>
            <div class="bg-[#111] p-8 rounded-2xl border border-slate-800">
                <i class="fas fa-expand text-indigo-500 text-3xl mb-4"></i>
                <h3 class="text-lg font-bold mb-2">Video Upscaler</h3>
                <button onclick="showPage('upscale-tool')" class="mt-4 bg-white text-black px-4 py-2 rounded-lg text-sm font-bold">Open Tool</button>
            </div>
        </div>
    </div>

    <!-- Individual Tool Pages -->
    <div id="noise-tool" class="tool-page max-w-2xl mx-auto text-center">
        <h2 class="text-3xl font-bold mb-6">Noise Reducer Tool</h2>
        <div class="border-2 border-dashed border-slate-700 p-20 rounded-3xl">
            <i class="fas fa-file-audio text-5xl mb-4 text-slate-500"></i>
            <p>Upload Audio File</p>
        </div>
    </div>

    <div id="subtitle-tool" class="tool-page max-w-2xl mx-auto text-center">
        <h2 class="text-3xl font-bold mb-6">Subtitle Generator</h2>
        <div class="border-2 border-dashed border-slate-700 p-20 rounded-3xl">
            <i class="fas fa-file-video text-5xl mb-4 text-slate-500"></i>
            <p>Upload Video File</p>
        </div>
    </div>

    <div id="upscale-tool" class="tool-page max-w-2xl mx-auto text-center">
        <h2 class="text-3xl font-bold mb-6">Video Upscaler</h2>
        <div class="border-2 border-dashed border-slate-700 p-20 rounded-3xl">
            <i class="fas fa-film text-5xl mb-4 text-slate-500"></i>
            <p>Upload Video for 4K</p>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.tool-page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
