<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 2FA Authenticator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Main Card -->
        <div class="main-card">
            <div class="card-header">
                <h1>🔐 2FA Authenticator</h1>
                <p>Secure Time-based One-Time Password Generator</p>
            </div>
            
            <div class="input-group">
                <label for="secretKey">Enter your 2FA Secret Key:</label>
                <input 
                    type="text" 
                    id="secretKey" 
                    placeholder="JBSWY3DPEHPK3PXP"
                    autocomplete="off"
                >
            </div>
            
            <button id="generateBtn" onclick="generateCode()">
                <span class="btn-icon">🔑</span>
                Generate Code
            </button>
            
            <p class="copy-hint" id="copyHint">✓ Code copied to clipboard!</p>
        </div>

        <!-- History Card -->
        <div class="history-card">
            <div class="history-header">
                <h2>📋 Recent Codes</h2>
                <span id="historyCount">0 saved</span>
            </div>
            <div id="historyList" class="history-list">
                <p class="empty-state">No codes generated yet</p>
            </div>
        </div>
    </div>

    <script src="totp.js"></script>
    <script src="script.js"></script>
</body>
</html>
