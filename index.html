<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Media Studio - Pro Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
    <!-- Navigation -->
    <nav class="p-6 flex justify-between bg-gray-800">
        <div class="text-2xl font-bold text-indigo-500">AI Media Studio</div>
        <div class="space-x-4">
            <a href="index.html" class="hover:text-indigo-400">Home</a>
            <a href="about.html" class="hover:text-indigo-400">About</a>
            <a href="contact.html" class="hover:text-indigo-400">Contact</a>
        </div>
    </nav>

    <!-- Main Tool Section -->
    <div class="max-w-2xl mx-auto mt-12 p-8 bg-gray-800 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-bold mb-4 text-center">AI Video Enhancer</h1>
        <input type="file" id="vid" class="w-full mb-4 p-3 bg-gray-700 rounded">
        
        <div class="grid grid-cols-2 gap-4">
            <button onclick="process('noise')" class="bg-indigo-600 p-3 rounded">Remove Noise</button>
            <button onclick="process('subtitle')" class="bg-indigo-600 p-3 rounded">Add Subtitles</button>
            <button onclick="process('upscale')" class="bg-indigo-600 p-3 rounded col-span-2">4K Upscale</button>
        </div>
        <div id="res" class="mt-6 p-4 bg-gray-900 rounded text-center">Status: Ready</div>
    </div>
</body>
</html>
