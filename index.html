<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 2FA Code Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Main Card -->
        <div class="main-card">
            <label for="secretKey">Enter your 2FA Secret Key:</label>
            <input 
                type="text" 
                id="secretKey" 
                placeholder="JBSWY3DPEHPK3PXP"
                autocomplete="off"
            >
            
            <!-- Button and Code Display Row -->
            <div class="action-row">
                <button id="generateBtn" onclick="generateCode()">Generate Code</button>
                <div id="codeBox" class="code-box">
                    <span id="totpCode">- - - - - -</span>
                    <div class="timer-wrapper" id="timerWrapper" style="display: none;">
                        <svg class="timer-circle" width="35" height="35">
                            <circle cx="17.5" cy="17.5" r="15"></circle>
                            <circle id="timerProgress" cx="17.5" cy="17.5" r="15"></circle>
                        </svg>
                        <span id="timer" class="timer">30</span>
                    </div>
                </div>
            </div>
            
            <p class="copy-hint" id="copyHint">✓ Code copied to clipboard!</p>
        </div>

        <!-- History Card -->
        <div class="history-card">
            <div class="history-header">
                <h2>📋 Recent Codes (Max 50)</h2>
                <span id="historyCount">0 codes saved</span>
            </div>
            <div id="historyList" class="history-list">
                <p class="empty-state">No codes generated yet</p>
            </div>
        </div>
    </div>

    <script src="totp.js"></script>
    <script src="script.js"></script>
</body>
</html>
