<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0b0f19; color: #e2e8f0; }
        .sidebar { background: #151921; }
        .tool-active { border: 2px solid #6366f1; background: #1e293b; }
    </style>
</head>
<body class="flex h-screen">

    <!-- Sidebar -->
    <div class="sidebar w-64 p-6 border-r border-slate-800">
        <h2 class="text-xl font-bold mb-10"><i class="fas fa-magic text-indigo-500 mr-2"></i> AI Media Studio</h2>
        <nav class="space-y-4">
            <a href="#" class="block p-3 rounded-lg bg-indigo-600"><i class="fas fa-home mr-3"></i> Dashboard</a>
            <a href="#" class="block p-3 rounded-lg hover:bg-slate-800"><i class="fas fa-cog mr-3"></i> Settings</a>
            <a href="#" class="block p-3 rounded-lg hover:bg-slate-800"><i class="fas fa-user mr-3"></i> Profile</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-10">
        <h1 class="text-3xl font-bold mb-8">Select Your AI Tool</h1>
        
        <div class="grid grid-cols-3 gap-6 mb-10">
            <div class="tool-active p-6 rounded-2xl cursor-pointer">
                <i class="fas fa-microphone-slash text-2xl text-indigo-400 mb-4"></i>
                <h3 class="font-bold">Noise Reduction</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-2xl cursor-pointer hover:bg-slate-700">
                <i class="fas fa-closed-captioning text-2xl text-indigo-400 mb-4"></i>
                <h3 class="font-bold">Subtitles</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-2xl cursor-pointer hover:bg-slate-700">
                <i class="fas fa-expand text-2xl text-indigo-400 mb-4"></i>
                <h3 class="font-bold">4K Upscale</h3>
            </div>
        </div>

        <!-- Working Area -->
        <div class="bg-slate-900 border border-slate-700 p-12 rounded-3xl text-center border-dashed">
            <i class="fas fa-cloud-upload-alt text-6xl text-slate-600 mb-6"></i>
            <h2 class="text-2xl font-bold">Upload your media to start</h2>
            <p class="text-slate-400 mb-6">Drag and drop or click to browse</p>
            <button class="bg-indigo-600 px-8 py-3 rounded-xl font-bold hover:bg-indigo-500">Select File</button>
        </div>
    </div>
</body>
</html>
