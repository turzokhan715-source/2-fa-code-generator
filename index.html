<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 2FA Code Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 3D Header Box -->
        <div class="header-box">
            <h1>🔐 2FA Code Generator</h1>
            <p class="subtitle">Secure offline TOTP authentication</p>
        </div>

        <!-- Main Card with Two Columns -->
        <div class="main-card">
            <!-- Left Column: Input -->
            <div class="input-section">
                <label for="secretKey">Enter 2FA Key:</label>
                <input 
                    type="text" 
                    id="secretKey" 
                    placeholder="JBSWY3DPEHPK3PXP"
                    autocomplete="off"
                >
            </div>

            <!-- Right Column: Code Display -->
            <div class="code-section">
                <label>Generate Code</label>
                <button id="generateBtn" onclick="generateCode()">Generate</button>
                <div id="codeDisplay" class="code-display hidden">
                    <div class="code-wrapper">
                        <span id="totpCode">------</span>
                        <div class="timer-circle-wrapper">
                            <svg class="timer-circle" width="35" height="35">
                                <circle cx="17.5" cy="17.5" r="15"></circle>
                                <circle id="timerProgress" cx="17.5" cy="17.5" r="15"></circle>
                            </svg>
                            <span id="timer" class="timer">30</span>
                        </div>
                    </div>
                    <p class="copy-hint" id="copyHint">✓ Copied!</p>
                </div>
            </div>
        </div>

        <!-- History Card -->
        <div class="history-card">
            <div class="history-header">
                <h2>📋 Recent Codes (Max 50)</h2>
                <span id="historyCount">0 codes saved</span>
            </div>
            <div id="historyList" class="history-list">
                <p class="empty-state">No codes generated yet</p>
            </div>
        </div>
    </div>

    <script src="totp.js"></script>
    <script src="script.js"></script>
</body>
</html>
